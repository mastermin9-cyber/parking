<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주차관리 시스템</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif; }
    @keyframes fadeIn  { from{opacity:0}    to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
    .fade-in  { animation: fadeIn  0.15s ease; }
    .slide-up { animation: slideUp 0.2s  ease; }
    .map-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // ─── 구역 정의 ───────────────────────────────────────────────────────────
  // 가로: A(상단1열), B(상단2열), C(하단1열), D(하단2열) — 각 10대
  // 세로: 지(지정주차), 공(공원주차) — 각 10대
  const N = 10;
  const mkRow  = key => Array.from({length:N}, (_,i) => `${key}${i+1}`);
  const ROWS   = { A: mkRow('A'), B: mkRow('B'), C: mkRow('C'), D: mkRow('D') };
  const VERTS  = { 지: mkRow('지'), 공: mkRow('공') };
  const ALL_SPOTS = [...Object.values(ROWS), ...Object.values(VERTS)].flat();

  function nowStr() {
    const d=new Date(), p=n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function elapsed(t) {
    const m=Math.floor((Date.now()-new Date(t.replace(' ','T')))/60000);
    if(m<60) return `${m}분`;
    return `${Math.floor(m/60)}시간${m%60?` ${m%60}분`:''}`;
  }

  // ─── 로그인 ───────────────────────────────────────────────────────────────
  function LoginScreen({ onLogin }) {
    const [name,setName]=useState('');
    const [role,setRole]=useState('직원');
    const ref=useRef();
    useEffect(()=>ref.current?.focus(),[]);
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-700 to-blue-900 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-xs">
          <div className="text-center mb-7">
            <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-3">🅿</div>
            <h1 className="text-xl font-bold text-slate-800">주차관리 시스템</h1>
          </div>
          <form onSubmit={e=>{e.preventDefault();if(name.trim())onLogin({name:name.trim(),role});}} className="space-y-4">
            <input ref={ref} value={name} onChange={e=>setName(e.target.value)} placeholder="이름 입력"
              className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
            <div className="grid grid-cols-2 gap-2">
              {['직원','관리자'].map(r=>(
                <button key={r} type="button" onClick={()=>setRole(r)}
                  className={`py-2.5 rounded-xl text-sm font-bold transition-all ${role===r?'bg-blue-600 text-white shadow':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                  {r}
                </button>
              ))}
            </div>
            <button type="submit" disabled={!name.trim()}
              className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold py-3 rounded-xl">
              시작하기
            </button>
          </form>
        </div>
      </div>
    );
  }

  // ─── 주차 칸 ──────────────────────────────────────────────────────────────
  function Spot({ id, data, onClick, vertical=false }) {
    const on = data!==null;
    return (
      <button onClick={()=>onClick(id)}
        className={`flex flex-col items-center justify-center rounded-lg border-2 transition-all active:scale-95 select-none shrink-0
          ${on?'bg-red-50 border-red-300 hover:bg-red-100':'bg-emerald-50 border-emerald-300 hover:bg-emerald-100'}
          ${vertical?'w-14 h-14':'w-12 h-12'}`}
      >
        <span className="text-[9px] text-slate-400 leading-none">{id}</span>
        {on ? (
          <>
            <span className="text-[10px] font-bold text-red-700 leading-tight mt-0.5 truncate w-full text-center px-0.5">{data.plate}</span>
            <span className="text-[8px] text-red-400 leading-none mt-0.5">{elapsed(data.entryTime)}</span>
          </>
        ) : (
          <span className="text-emerald-400 font-bold text-base leading-none mt-0.5">P</span>
        )}
      </button>
    );
  }

  // ─── 모달 ─────────────────────────────────────────────────────────────────
  function Modal({ onClose, children }) {
    return (
      <div className="fade-in fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center sm:p-4"
        onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="slide-up bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl shadow-2xl p-6">
          {children}
        </div>
      </div>
    );
  }

  function EntryModal({ spotId, onConfirm, onClose }) {
    const [plate,setPlate]=useState('');
    const ref=useRef();
    useEffect(()=>ref.current?.focus(),[]);
    return (
      <Modal onClose={onClose}>
        <p className="text-xs text-slate-400 mb-0.5">구역 <b className="text-blue-600">{spotId}</b></p>
        <h2 className="text-lg font-bold text-slate-800 mb-4">입차 등록</h2>
        <form onSubmit={e=>{e.preventDefault();if(plate.trim())onConfirm(spotId,plate.trim());}}>
          <input ref={ref} value={plate} onChange={e=>setPlate(e.target.value)}
            placeholder="차량번호 (예: 12가 3456)"
            onKeyDown={e=>e.key==='Escape'&&onClose()}
            className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-center tracking-widest mb-4 focus:outline-none focus:border-blue-400" />
          <div className="flex gap-2">
            <button type="button" onClick={onClose} className="flex-1 py-3 rounded-xl border border-slate-200 text-sm text-slate-500">취소</button>
            <button type="submit" disabled={!plate.trim()} className="flex-1 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white text-sm font-bold">입차 등록</button>
          </div>
        </form>
      </Modal>
    );
  }

  function ExitModal({ spotId, data, onExit, onClose }) {
    return (
      <Modal onClose={onClose}>
        <p className="text-xs text-slate-400 mb-0.5">구역 <b className="text-blue-600">{spotId}</b></p>
        <h2 className="text-lg font-bold text-slate-800 mb-4">차량 정보</h2>
        <div className="bg-slate-50 rounded-xl p-4 space-y-2.5 mb-4 text-sm">
          {[['차량번호',<b className="tracking-wider">{data.plate}</b>],
            ['입차시간',data.entryTime],
            ['주차시간',<b className="text-blue-600">{elapsed(data.entryTime)}</b>],
            ['담당자',data.attendant]
          ].map(([l,v])=>(
            <div key={l} className="flex justify-between items-center">
              <span className="text-slate-400 text-xs">{l}</span>
              <span className="text-slate-700">{v}</span>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 py-3 rounded-xl border border-slate-200 text-sm text-slate-500">닫기</button>
          <button onClick={()=>onExit(spotId)} className="flex-1 py-3 rounded-xl bg-red-500 hover:bg-red-600 text-white text-sm font-bold">출차 처리</button>
        </div>
      </Modal>
    );
  }

  function RecordsPanel({ records, onClose, onClear }) {
    return (
      <div className="fade-in fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center sm:p-4"
        onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="slide-up bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[85vh] flex flex-col">
          <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100 shrink-0">
            <h2 className="font-bold text-slate-800">출입 기록</h2>
            <div className="flex gap-2">
              {records.length>0&&<button onClick={onClear} className="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded">전체삭제</button>}
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl">✕</button>
            </div>
          </div>
          <div className="overflow-y-auto flex-1 p-4 space-y-2">
            {records.length===0 ? (
              <div className="text-center py-12 text-slate-300"><p className="text-3xl mb-2">📋</p><p className="text-sm">기록이 없습니다</p></div>
            ) : [...records].reverse().map((r,i)=>(
              <div key={i} className="bg-slate-50 rounded-xl p-3 flex items-center gap-3">
                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0 ${r.type==='입차'?'bg-emerald-500':'bg-red-500'}`}>
                  {r.type==='입차'?'↓':'↑'}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-bold text-sm text-slate-800">{r.plate}</span>
                    <span className="text-xs bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded">{r.spotId}</span>
                    <span className={`text-xs font-semibold ${r.type==='입차'?'text-emerald-600':'text-red-500'}`}>{r.type}</span>
                  </div>
                  <div className="text-xs text-slate-400 mt-0.5">{r.time} · {r.attendant}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ─── 메인 앱 ─────────────────────────────────────────────────────────────
  function App() {
    const [user,setUser]=useState(()=>{ try{return JSON.parse(localStorage.getItem('pk_user'));}catch{return null;} });
    const [spots,setSpots]=useState(()=>{ try{return JSON.parse(localStorage.getItem('pk_spots'))||Object.fromEntries(ALL_SPOTS.map(id=>[id,null]));}catch{return Object.fromEntries(ALL_SPOTS.map(id=>[id,null]));} });
    const [records,setRecords]=useState(()=>{ try{return JSON.parse(localStorage.getItem('pk_records'))||[];}catch{return [];} });
    const [modal,setModal]=useState(null);
    const [showRec,setShowRec]=useState(false);
    const [,setTick]=useState(0);

    useEffect(()=>{ if(user) localStorage.setItem('pk_user',JSON.stringify(user)); },[user]);
    useEffect(()=>{ localStorage.setItem('pk_spots',JSON.stringify(spots)); },[spots]);
    useEffect(()=>{ localStorage.setItem('pk_records',JSON.stringify(records)); },[records]);
    useEffect(()=>{ const t=setInterval(()=>setTick(x=>x+1),60000); return ()=>clearInterval(t); },[]);

    const total=ALL_SPOTS.length;
    const occupied=Object.values(spots).filter(s=>s!==null).length;
    const available=total-occupied;
    const pct=Math.round((occupied/total)*100);

    function handleClick(id){ setModal({type:spots[id]?'exit':'entry',id}); }
    function handleEntry(id,plate){
      const data={plate,entryTime:nowStr(),attendant:user.name};
      setSpots(p=>({...p,[id]:data}));
      setRecords(p=>[...p,{type:'입차',spotId:id,plate,time:nowStr(),attendant:user.name}]);
      setModal(null);
    }
    function handleExit(id){
      const d=spots[id];
      setRecords(p=>[...p,{type:'출차',spotId:id,plate:d.plate,time:nowStr(),attendant:user.name}]);
      setSpots(p=>({...p,[id]:null}));
      setModal(null);
    }

    if(!user) return <LoginScreen onLogin={u=>{setUser(u);localStorage.setItem('pk_user',JSON.stringify(u));}} />;

    // 가로 행 렌더
    function HorizRow({ keys, label, color }) {
      return (
        <div className="flex items-center gap-1.5">
          <div className={`text-[10px] font-bold w-5 shrink-0 text-center ${color}`}>{label}</div>
          <div className="flex gap-1">
            {keys.map(id=><Spot key={id} id={id} data={spots[id]} onClick={handleClick} />)}
          </div>
        </div>
      );
    }

    // 세로 열 렌더
    function VertCol({ keys, label, color }) {
      return (
        <div className="flex flex-col items-center gap-1">
          <div className={`text-[10px] font-bold mb-0.5 ${color}`}>{label}</div>
          {keys.map(id=><Spot key={id} id={id} data={spots[id]} onClick={handleClick} vertical />)}
        </div>
      );
    }

    return (
      <div className="min-h-screen bg-slate-100">
        {/* 헤더 */}
        <header className="bg-blue-700 text-white px-4 py-3 shadow-lg sticky top-0 z-40">
          <div className="max-w-3xl mx-auto flex items-center justify-between">
            <div className="flex items-center gap-2.5">
              <div className="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center text-lg">🅿</div>
              <div>
                <h1 className="font-bold text-sm">주차관리 시스템</h1>
                <p className="text-blue-200 text-[10px]">{user.name} · {user.role}</p>
              </div>
            </div>
            <div className="flex gap-2">
              {user.role==='관리자'&&<button onClick={()=>setShowRec(true)} className="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg font-semibold">기록</button>}
              <button onClick={()=>{setUser(null);localStorage.removeItem('pk_user');}} className="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg">로그아웃</button>
            </div>
          </div>
        </header>

        {/* 통계 */}
        <div className="bg-white border-b border-slate-200 px-4 py-3">
          <div className="max-w-3xl mx-auto">
            <div className="flex items-center gap-4 mb-2">
              <span className="text-xs text-slate-500">전체 <b className="text-slate-700">{total}</b>면</span>
              <span className="text-xs flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-400 inline-block"></span>빈자리 <b className="text-emerald-600">{available}</b></span>
              <span className="text-xs flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-400 inline-block"></span>주차중 <b className="text-red-600">{occupied}</b></span>
              <span className="ml-auto text-xs font-bold text-slate-400">{pct}%</span>
            </div>
            <div className="bg-slate-100 rounded-full h-2 overflow-hidden">
              <div className={`h-full rounded-full transition-all ${pct>80?'bg-red-400':pct>50?'bg-amber-400':'bg-emerald-400'}`} style={{width:`${pct}%`}} />
            </div>
          </div>
        </div>

        {/* 주차 맵 */}
        <main className="max-w-3xl mx-auto p-3">
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">

            {/* 범례 */}
            <div className="flex justify-center gap-5 mb-4 text-xs text-slate-400">
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-emerald-100 border border-emerald-300 inline-block"></span>빈자리</span>
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-red-100 border border-red-300 inline-block"></span>주차중</span>
            </div>

            <div className="map-scroll">
              <div style={{minWidth:'540px'}} className="space-y-4">

                {/* 상단 가로구역 */}
                <div className="border border-slate-100 rounded-xl p-3 space-y-1.5">
                  <p className="text-[10px] font-bold text-slate-400 mb-2">▲ 상단 가로구역</p>
                  <HorizRow keys={ROWS.A} label="A" color="text-blue-500" />
                  <HorizRow keys={ROWS.B} label="B" color="text-blue-400" />
                </div>

                {/* 주행로 */}
                <div className="flex items-center gap-2 px-1">
                  <div className="flex-1 border-t-2 border-dashed border-slate-200"></div>
                  <span className="text-[10px] text-slate-300 font-semibold shrink-0">── 주행로 ──</span>
                  <div className="flex-1 border-t-2 border-dashed border-slate-200"></div>
                </div>

                {/* 하단 가로구역 */}
                <div className="border border-slate-100 rounded-xl p-3 space-y-1.5">
                  <p className="text-[10px] font-bold text-slate-400 mb-2">▼ 하단 가로구역</p>
                  <HorizRow keys={ROWS.C} label="C" color="text-violet-500" />
                  <HorizRow keys={ROWS.D} label="D" color="text-violet-400" />
                </div>

                {/* 세로 구역 */}
                <div className="border border-slate-100 rounded-xl p-3">
                  <p className="text-[10px] font-bold text-slate-400 mb-3">↕ 세로 주차구역</p>
                  <div className="flex gap-6">
                    <VertCol keys={VERTS['지']} label="지정주차" color="text-amber-500" />
                    <div className="border-l border-dashed border-slate-200 mx-1"></div>
                    <VertCol keys={VERTS['공']} label="공원주차" color="text-cyan-500" />
                  </div>
                </div>

              </div>
            </div>

            <p className="text-center text-[11px] text-slate-300 mt-4">빈 칸 클릭 → 입차 · 주차중 클릭 → 출차</p>
          </div>
        </main>

        {modal?.type==='entry'&&<EntryModal spotId={modal.id} onConfirm={handleEntry} onClose={()=>setModal(null)} />}
        {modal?.type==='exit'&&spots[modal.id]&&<ExitModal spotId={modal.id} data={spots[modal.id]} onExit={handleExit} onClose={()=>setModal(null)} />}
        {showRec&&<RecordsPanel records={records} onClose={()=>setShowRec(false)} onClear={()=>{if(confirm('기록을 모두 삭제할까요?'))setRecords([]);}} />}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
